services:
  app:
    build: .
    ports:
      - "5000:5000"
    volumes:
      # Cache di-persist di host agar tidak hilang saat container restart
      - ./cache:/app/cache
      - ./logs:/app/logs
    environment:
      - FLASK_ENV=production
      - API_BASE_URL=http://192.168.1.6:5000
      - FLASK_PORT=5000
    restart: unless-stopped